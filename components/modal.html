<!-- Service Modal -->
<div id="service-modal" class="modal">
    <div class="modal-backdrop" onclick="closeServiceModal()"></div>
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="modal-content">
            <button onclick="closeServiceModal()" class="absolute top-4 right-4 w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors text-white">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <h3 id="modal-title" class="font-display text-2xl font-bold mb-6 text-white"></h3>
            <div id="modal-body" class="text-gray-300"></div>
        </div>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast">
    <div class="glass-card px-6 py-4 rounded-xl flex items-center gap-3 border-l-4 border-sit-accent">
        <i data-lucide="check-circle" class="w-6 h-6 text-sit-accent"></i>
        <div>
            <div class="font-semibold text-white">Message Sent!</div>
            <div class="text-sm text-gray-400">We'll get back to you within 24 hours.</div>
        </div>
    </div>
</div>
